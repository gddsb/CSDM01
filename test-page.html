<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生产报工页面测试工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #1890ff; margin-bottom: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #e8e8e8; border-radius: 4px; }
        .test-section h2 { color: #333; margin-bottom: 10px; font-size: 16px; }
        .status { padding: 8px 12px; border-radius: 4px; margin: 10px 0; font-size: 14px; }
        .status.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .status.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .status.info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }
        button { background: #1890ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #40a9ff; }
        button:disabled { background: #d9d9d9; cursor: not-allowed; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .iframe-container { margin: 20px 0; border: 2px solid #1890ff; border-radius: 4px; }
        iframe { width: 100%; height: 600px; border: none; }
        .log-area { background: #001529; color: #00ff00; padding: 15px; border-radius: 4px; height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 生产报工页面诊断工具</h1>
        
        <div class="test-section">
            <h2>📋 测试说明</h2>
            <div class="status info">
                本工具用于诊断 <code>http://localhost:5173/#/production/reporting</code> 页面问题。<br>
                <strong>前端地址:</strong> <a href="http://localhost:5174" target="_blank">http://localhost:5174</a> (端口5173被占用，实际运行在5174)<br>
                <strong>后端API:</strong> <a href="http://localhost:3001/api/health" target="_blank">http://localhost:3001/api/health</a>
            </div>
        </div>

        <div class="test-section">
            <h2>1️⃣ 后端服务检查</h2>
            <button onclick="testBackend()">测试后端API</button>
            <div id="backend-status"></div>
        </div>

        <div class="test-section">
            <h2>2️⃣ 模拟登录</h2>
            <button onclick="simulateLogin()">模拟登录 (admin/123456)</button>
            <button onclick="clearAuth()">清除认证信息</button>
            <div id="login-status"></div>
        </div>

        <div class="test-section">
            <h2>3️⃣ 生产报工API测试</h2>
            <button onclick="testWorkOrdersAPI()">测试工单API</button>
            <button onclick="testDefectTypesAPI()">测试不良类型API</button>
            <button onclick="testDevicesAPI()">测试设备API</button>
            <div id="api-status"></div>
        </div>

        <div class="test-section">
            <h2>4️⃣ 实时日志监控</h2>
            <div class="log-area" id="log-area"></div>
        </div>

        <div class="test-section">
            <h2>5️⃣ 页面预览</h2>
            <button onclick="loadPage()">加载生产报工页面</button>
            <div class="iframe-container" id="iframe-container" style="display:none;">
                <iframe id="test-iframe" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        const FRONTEND_URL = 'http://localhost:5174';
        let authToken = '';

        // 日志函数
        function log(message, type = 'info') {
            const logArea = document.getElementById('log-area');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff4d4f' : type === 'success' ? '#52c41a' : '#1890ff';
            logArea.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 测试后端服务
        async function testBackend() {
            const statusDiv = document.getElementById('backend-status');
            statusDiv.innerHTML = '<div class="status info">正在测试后端服务...</div>';
            log('开始测试后端服务...');

            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    statusDiv.innerHTML = `<div class="status success">✅ 后端服务正常: ${data.message}</div>`;
                    log('后端服务正常', 'success');
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ 后端服务异常</div>`;
                    log('后端服务异常', 'error');
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ 无法连接后端: ${error.message}</div>`;
                log('后端连接失败: ' + error.message, 'error');
            }
        }

        // 模拟登录
        async function simulateLogin() {
            const statusDiv = document.getElementById('login-status');
            statusDiv.innerHTML = '<div class="status info">正在登录...</div>';
            log('开始模拟登录...');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: '123456' })
                });
                
                const data = await response.json();
                
                if (data.success && data.data) {
                    authToken = data.data.token;
                    localStorage.setItem('mes_token', authToken);
                    localStorage.setItem('mes_user', JSON.stringify(data.data.user));
                    
                    statusDiv.innerHTML = `
                        <div class="status success">
                            ✅ 登录成功<br>
                            <strong>用户:</strong> ${data.data.user.username}<br>
                            <strong>姓名:</strong> ${data.data.user.real_name}<br>
                            <strong>角色:</strong> ${data.data.user.role?.role_name || '-'}<br>
                            <strong>Token:</strong> <code>${authToken.substring(0, 20)}...</code>
                        </div>
                    `;
                    log('登录成功: ' + data.data.user.username, 'success');
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ 登录失败: ${data.message}</div>`;
                    log('登录失败: ' + data.message, 'error');
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ 登录请求失败: ${error.message}</div>`;
                log('登录请求失败: ' + error.message, 'error');
            }
        }

        // 清除认证信息
        function clearAuth() {
            localStorage.removeItem('mes_token');
            localStorage.removeItem('mes_user');
            authToken = '';
            document.getElementById('login-status').innerHTML = '<div class="status info">认证信息已清除</div>';
            log('认证信息已清除', 'info');
        }

        // 测试工单API
        async function testWorkOrdersAPI() {
            const statusDiv = document.getElementById('api-status');
            log('测试工单API...');

            try {
                const token = localStorage.getItem('mes_token');
                if (!token) {
                    throw new Error('未找到认证token，请先登录');
                }

                const response = await fetch(`${API_BASE}/production/work-orders?page=1&pageSize=10&status=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = `
                        <div class="status success">
                            ✅ 工单API正常<br>
                            <strong>总数:</strong> ${data.total || 0}<br>
                            <pre>${JSON.stringify(data.data || [], null, 2).substring(0, 500)}</pre>
                        </div>
                    `;
                    log('工单API正常，共 ' + (data.total || 0) + ' 条记录', 'success');
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ 工单API失败: ${data.message}</div>`;
                    log('工单API失败: ' + data.message, 'error');
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ 请求失败: ${error.message}</div>`;
                log('工单API请求失败: ' + error.message, 'error');
            }
        }

        // 测试不良类型API
        async function testDefectTypesAPI() {
            const statusDiv = document.getElementById('api-status');
            log('测试不良类型API...');

            try {
                const token = localStorage.getItem('mes_token');
                const response = await fetch(`${API_BASE}/basic/defect-types?page=1&pageSize=10&status=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML += `
                        <div class="status success">
                            ✅ 不良类型API正常<br>
                            <pre>${JSON.stringify(data.data || [], null, 2).substring(0, 500)}</pre>
                        </div>
                    `;
                    log('不良类型API正常', 'success');
                } else {
                    statusDiv.innerHTML += `<div class="status error">❌ 不良类型API失败: ${data.message}</div>`;
                    log('不良类型API失败: ' + data.message, 'error');
                }
            } catch (error) {
                statusDiv.innerHTML += `<div class="status error">❌ 请求失败: ${error.message}</div>`;
                log('不良类型API请求失败: ' + error.message, 'error');
            }
        }

        // 测试设备API
        async function testDevicesAPI() {
            const statusDiv = document.getElementById('api-status');
            log('测试设备API...');

            try {
                const token = localStorage.getItem('mes_token');
                const response = await fetch(`${API_BASE}/basic/devices?page=1&pageSize=10`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML += `
                        <div class="status success">
                            ✅ 设备API正常<br>
                            <pre>${JSON.stringify(data.data || [], null, 2).substring(0, 500)}</pre>
                        </div>
                    `;
                    log('设备API正常', 'success');
                } else {
                    statusDiv.innerHTML += `<div class="status error">❌ 设备API失败: ${data.message}</div>`;
                    log('设备API失败: ' + data.message, 'error');
                }
            } catch (error) {
                statusDiv.innerHTML += `<div class="status error">❌ 请求失败: ${error.message}</div>`;
                log('设备API请求失败: ' + error.message, 'error');
            }
        }

        // 加载页面
        function loadPage() {
            const container = document.getElementById('iframe-container');
            const iframe = document.getElementById('test-iframe');
            
            container.style.display = 'block';
            iframe.src = `${FRONTEND_URL}/#/production/reporting`;
            log('加载生产报工页面...');
            
            // 监听iframe加载事件
            iframe.onload = function() {
                log('页面加载完成', 'success');
                
                // 尝试访问iframe内容（可能因跨域限制失败）
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    log('成功访问iframe文档');
                } catch (error) {
                    log('无法访问iframe内容（可能受跨域限制）', 'info');
                }
            };
            
            iframe.onerror = function() {
                log('页面加载失败', 'error');
            };
        }

        // 页面加载时自动测试
        window.onload = function() {
            log('诊断工具已启动', 'success');
            testBackend();
            
            // 检查是否有已保存的token
            const savedToken = localStorage.getItem('mes_token');
            if (savedToken) {
                log('检测到已保存的认证token');
            }
        };
    </script>
</body>
</html>
